<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האנגלית של תום וגיא - גרסה מקומית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .toast { padding: 1rem; border-radius: 1rem; color: white; font-weight: bold; opacity: 0; transition: 0.3s; transform: translateY(-20px); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div id="toast-container"></div>

    <div class="w-full max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black text-blue-600 mb-2">האנגלית של תום</h1>
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-100 text-[10px] font-bold text-blue-600 uppercase">
                <i class="fas fa-hdd ml-1"></i> שמירה מקומית על המחשב
            </div>
        </header>

        <!-- מסך בחירה -->
        <div id="view-selection" class="glass-panel p-8 text-center space-y-6">
            <h2 class="text-2xl font-bold">מי נכנס למערכת?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="showView('view-guy-login')" class="bg-indigo-500 text-white p-6 rounded-2xl font-bold text-xl hover:bg-indigo-600 transition shadow-lg">גיא (מנהל)</button>
                <button onclick="showView('view-tom-dash')" class="bg-green-500 text-white p-6 rounded-2xl font-bold text-xl hover:bg-green-600 transition shadow-lg">תום (שחקן)</button>
            </div>
        </div>

        <!-- כניסת גיא -->
        <div id="view-guy-login" class="glass-panel p-8 text-center max-w-md mx-auto hidden">
            <h2 class="text-2xl font-bold mb-4">סיסמת מנהל</h2>
            <input type="password" id="guy-password" class="w-full p-4 border rounded-xl mb-4 text-center text-2xl" placeholder="סיסמה">
            <button onclick="verifyGuy()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">היכנס</button>
            <button onclick="showView('view-selection')" class="mt-4 text-gray-400 block w-full">ביטול</button>
        </div>

        <!-- דאשבורד גיא -->
        <div id="view-guy-dash" class="hidden space-y-4">
            <div class="glass-panel p-6">
                <button onclick="showView('view-selection')" class="text-red-500 font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> יציאה
                </button>
                <h2 class="text-2xl font-bold mb-2">הוספת מילה חדשה</h2>
                
                <div class="space-y-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div>
                        <label class="block text-sm font-bold text-blue-800 mb-1">הקלד מילה (בעברית או אנגלית):</label>
                        <div class="flex gap-2">
                            <input type="text" id="new-word-input" class="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="למשל: תפוח">
                            <button onclick="fetchAISuggestion()" id="btn-ai" class="bg-indigo-600 text-white px-4 rounded-lg font-bold flex items-center gap-2">
                                <span id="ai-btn-text"><i class="fas fa-magic"></i> הצעה מה-AI</span>
                                <div id="ai-btn-loader" class="loader hidden"></div>
                            </button>
                        </div>
                    </div>

                    <div id="edit-area" class="space-y-3 pt-2 border-t border-blue-200 mt-2">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-500">המילה בעברית:</label>
                                <input type="text" id="edit-hebrew" class="w-full p-2 border rounded-lg" placeholder="תפוח">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500">המילה באנגלית:</label>
                                <input type="text" id="edit-english" class="w-full p-2 border rounded-lg" placeholder="Apple">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500">תשובות אפשריות לתום (הפרד בפסיקים):</label>
                            <input type="text" id="edit-phonetics" class="w-full p-2 border rounded-lg" placeholder="אפל, apple">
                        </div>
                        <button onclick="saveNewWord()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-green-700 transition">שמור מילה לרשימה</button>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6">
                <h3 class="font-bold mb-4 text-gray-700">המילים ששמרת (<span id="count">0</span>)</h3>
                <div id="guy-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- דאשבורד תום -->
        <div id="view-tom-dash" class="hidden space-y-4">
            <div class="glass-panel p-8 text-center">
                <button onclick="showView('view-selection')" class="text-gray-400 block mb-4">חזרה</button>
                <h2 class="text-3xl font-black text-green-600">היי תום! מה נלמד היום?</h2>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startPractice('words')" class="bg-blue-500 text-white p-6 rounded-2xl font-bold shadow-md hover:scale-105 transition">תרגול מילים</button>
                    <button onclick="startPractice('sentences')" class="bg-purple-500 text-white p-6 rounded-2xl font-bold shadow-md hover:scale-105 transition">תרגול משפטים</button>
                </div>
            </div>
            <div id="tom-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- תרגול -->
        <div id="view-practice" class="glass-panel p-8 text-center hidden">
            <button onclick="showView('view-tom-dash')" class="text-gray-400 block mb-4">סגור תרגול</button>
            <div id="practice-loading" class="hidden py-10 flex flex-col items-center gap-4">
                <div class="loader w-10 h-10 border-4"></div>
                <p class="text-blue-500 font-bold">מכין לך שאלה...</p>
            </div>
            <div id="practice-content">
                <h2 id="practice-q" class="text-4xl font-black mb-8 text-blue-900">...</h2>
                <input type="text" id="practice-input" class="w-full p-4 border-4 border-blue-100 rounded-2xl text-center text-3xl mb-4 focus:outline-none focus:border-blue-400" placeholder="כתוב את התשובה...">
                <button onclick="checkAnswer()" class="w-full bg-green-500 text-white py-6 rounded-2xl font-bold text-2xl shadow-lg active:scale-95 transition">בדוק תשובה!</button>
                <p class="mt-4 text-gray-400 text-sm italic">רמז: השתמש במילים שגיא לימד אותך</p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        let vocab = JSON.parse(localStorage.getItem('tom_english_vocab') || '{}');
        let currentQuestion = null;
        let pType = 'words';

        function removeNikud(text) {
            if (!text) return "";
            return text.replace(/[\u0591-\u05C7]/g, "");
        }

        function saveToStorage() {
            localStorage.setItem('tom_english_vocab', JSON.stringify(vocab));
            render();
        }

        async function callGemini(prompt, systemPrompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        window.fetchAISuggestion = async () => {
            const input = document.getElementById('new-word-input').value.trim();
            if (!input) return;
            document.getElementById('ai-btn-loader').classList.remove('hidden');
            document.getElementById('ai-btn-text').classList.add('hidden');

            try {
                const res = await callGemini(input, "Return JSON: {english, hebrew, phonetics: [hebrew_sounds]}. NO NIKUD.");
                document.getElementById('edit-hebrew').value = res.hebrew;
                document.getElementById('edit-english').value = res.english;
                document.getElementById('edit-phonetics').value = res.phonetics.join(', ');
            } catch (e) {
                showToast("שגיאה ב-AI", "bg-red-500");
            } finally {
                document.getElementById('ai-btn-loader').classList.add('hidden');
                document.getElementById('ai-btn-text').classList.remove('hidden');
            }
        };

        window.saveNewWord = () => {
            const heb = document.getElementById('edit-hebrew').value.trim();
            const eng = document.getElementById('edit-english').value.trim();
            const phons = document.getElementById('edit-phonetics').value.split(',').map(p => removeNikud(p.trim().toLowerCase())).filter(p => p);
            if (!heb || !eng || phons.length === 0) return;

            vocab[eng.toLowerCase()] = { hebrew: heb, english: eng, phonetics: phons };
            saveToStorage();
            ['new-word-input', 'edit-hebrew', 'edit-english', 'edit-phonetics'].forEach(id => document.getElementById(id).value = "");
            showToast("נשמר!", "bg-green-500");
        };

        window.deleteWord = (id) => { delete vocab[id]; saveToStorage(); };

        function render() {
            const list = Object.entries(vocab);
            document.getElementById('count').innerText = list.length;
            const guyList = document.getElementById('guy-list');
            if (guyList) {
                guyList.innerHTML = list.map(([id, w]) => `
                    <div class="flex items-center justify-between p-3 border rounded-xl bg-gray-50">
                        <div class="text-right">
                            <span class="font-bold">${w.hebrew}</span>
                            <span class="text-xs text-gray-400 mr-2">(${w.english})</span>
                            <div class="text-[10px] text-blue-400">תשובה נכונה: ${w.phonetics[0]}</div>
                        </div>
                        <button onclick="deleteWord('${id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                `).join('');
            }
            const tomList = document.getElementById('tom-list');
            if (tomList) {
                tomList.innerHTML = list.map(([id, w]) => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-b-4 border-green-300">
                        <div class="font-bold text-xl">${w.hebrew}</div>
                        <div class="text-green-600 font-bold">${w.phonetics[0]}</div>
                    </div>
                `).join('');
            }
        }

        window.startPractice = async (type) => {
            const words = Object.values(vocab);
            if (!words.length) return showToast("אין מילים ברשימה", "bg-orange-500");
            pType = type;
            showView('view-practice');
            document.getElementById('practice-input').value = "";
            document.getElementById('practice-content').classList.add('hidden');
            document.getElementById('practice-loading').classList.remove('hidden');

            if (type === 'words') {
                const w = words[Math.floor(Math.random() * words.length)];
                currentQuestion = { q: w.hebrew, answers: w.phonetics };
                document.getElementById('practice-q').innerText = currentQuestion.q;
                document.getElementById('practice-loading').classList.add('hidden');
                document.getElementById('practice-content').classList.remove('hidden');
            } else {
                try {
                    // יוצרים רשימה של המילים שגיא הכניס (עברית ואנגלית)
                    const mapping = words.map(w => `${w.hebrew}=${w.english}`).join(', ');
                    const sys = `Create a short Hebrew sentence using ONLY these Hebrew words: [${words.map(w => w.hebrew).join(', ')}].
                    Return JSON: {"hebrew_sentence": "כלב כלב", "english_words_used": ["dog", "dog"]}.
                    The "english_words_used" must match the keys in our vocab.`;
                    
                    const res = await callGemini("create sentence", sys);
                    
                    // בניית התשובה הנכונה לפי מה שגיא הגדיר לכל מילה בנפרד
                    const correctPhonetics = res.english_words_used.map(engKey => {
                        const wordData = vocab[engKey.toLowerCase()];
                        return wordData ? wordData.phonetics[0] : "";
                    }).filter(p => p).join(' ');

                    currentQuestion = { q: res.hebrew_sentence, answers: [correctPhonetics] };
                    document.getElementById('practice-q').innerText = currentQuestion.q;
                } catch (e) {
                    startPractice('words');
                } finally {
                    document.getElementById('practice-loading').classList.add('hidden');
                    document.getElementById('practice-content').classList.remove('hidden');
                }
            }
        };

        window.checkAnswer = () => {
            const val = removeNikud(document.getElementById('practice-input').value.trim()).toLowerCase();
            if (!val || !currentQuestion) return;

            const isCorrect = currentQuestion.answers.some(a => removeNikud(a).toLowerCase() === val);
            if (isCorrect) {
                showToast("כל הכבוד! 🏆", "bg-green-500");
                setTimeout(() => startPractice(pType), 1000);
            } else {
                showToast("לא בדיוק, נסה שוב", "bg-orange-500");
            }
        };

        window.showView = (id) => {
            ['view-selection', 'view-guy-login', 'view-guy-dash', 'view-tom-dash', 'view-practice'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.verifyGuy = () => {
            if (document.getElementById('guy-password').value === '5312') {
                showView('view-guy-dash');
                document.getElementById('guy-password').value = "";
            } else showToast('סיסמה שגויה', 'bg-red-500');
        };

        function showToast(msg, color) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast show ${color} shadow-lg`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        render();
    </script>
</body>
</html>
