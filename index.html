<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האנגלית של תום וגיא - גרסה מקומית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .toast { padding: 1rem; border-radius: 1rem; color: white; font-weight: bold; opacity: 0; transition: 0.3s; transform: translateY(-20px); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div id="toast-container"></div>

    <div class="w-full max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black text-blue-600 mb-2">האנגלית של תום</h1>
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-100 text-[10px] font-bold text-blue-600 uppercase">
                <i class="fas fa-hdd ml-1"></i> שמירה מקומית על המחשב
            </div>
        </header>

        <!-- מסך בחירה -->
        <div id="view-selection" class="glass-panel p-8 text-center space-y-6">
            <h2 class="text-2xl font-bold">מי נכנס למערכת?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="showView('view-guy-login')" class="bg-indigo-500 text-white p-6 rounded-2xl font-bold text-xl hover:bg-indigo-600 transition shadow-lg">גיא (מנהל)</button>
                <button onclick="showView('view-tom-dash')" class="bg-green-500 text-white p-6 rounded-2xl font-bold text-xl hover:bg-green-600 transition shadow-lg">תום (שחקן)</button>
            </div>
        </div>

        <!-- כניסת גיא -->
        <div id="view-guy-login" class="glass-panel p-8 text-center max-w-md mx-auto hidden">
            <h2 class="text-2xl font-bold mb-4">סיסמת מנהל</h2>
            <input type="password" id="guy-password" class="w-full p-4 border rounded-xl mb-4 text-center text-2xl" placeholder="סיסמה">
            <button onclick="verifyGuy()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">היכנס</button>
            <button onclick="showView('view-selection')" class="mt-4 text-gray-400 block w-full">ביטול</button>
        </div>

        <!-- דאשבורד גיא -->
        <div id="view-guy-dash" class="hidden space-y-4">
            <div class="glass-panel p-6">
                <button onclick="showView('view-selection')" class="text-red-500 font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> יציאה
                </button>
                <h2 class="text-2xl font-bold mb-4">הוספת מילה בעזרת AI</h2>
                <div class="flex gap-2">
                    <input type="text" id="new-word-input" class="flex-1 p-4 border rounded-xl" placeholder="למשל: Apple או שולחן">
                    <button onclick="addWordAI()" id="btn-add" class="bg-blue-600 text-white px-6 rounded-xl font-bold flex items-center gap-2 min-w-[120px] justify-center">
                        <span id="btn-text">הוסף</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>
                </div>
            </div>
            <div class="glass-panel p-6">
                <h3 class="font-bold mb-4 text-gray-700">המילים ששמרת (<span id="count">0</span>)</h3>
                <div id="guy-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- דאשבורד תום -->
        <div id="view-tom-dash" class="hidden space-y-4">
            <div class="glass-panel p-8 text-center">
                <button onclick="showView('view-selection')" class="text-gray-400 block mb-4">חזרה</button>
                <h2 class="text-3xl font-black text-green-600">היי תום! מה נלמד היום?</h2>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startPractice('words')" class="bg-blue-500 text-white p-6 rounded-2xl font-bold shadow-md hover:scale-105 transition">תרגול מילים</button>
                    <button onclick="startPractice('sentences')" class="bg-purple-500 text-white p-6 rounded-2xl font-bold shadow-md hover:scale-105 transition">תרגול משפטים</button>
                </div>
            </div>
            <div id="tom-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- תרגול -->
        <div id="view-practice" class="glass-panel p-8 text-center hidden">
            <button onclick="showView('view-tom-dash')" class="text-gray-400 block mb-4">סגור תרגול</button>
            <div id="practice-loading" class="hidden py-10 flex flex-col items-center gap-4">
                <div class="loader w-10 h-10 border-4"></div>
                <p class="text-blue-500 font-bold">ה-AI מכין לך שאלה...</p>
            </div>
            <div id="practice-content">
                <h2 id="practice-q" class="text-4xl font-black mb-8 text-blue-900">...</h2>
                <input type="text" id="practice-input" class="w-full p-4 border-4 border-blue-100 rounded-2xl text-center text-3xl mb-4 focus:outline-none focus:border-blue-400" placeholder="כתוב באנגלית...">
                <button onclick="checkAnswer()" class="w-full bg-green-500 text-white py-6 rounded-2xl font-bold text-2xl shadow-lg active:scale-95 transition">בדוק תשובה!</button>
            </div>
        </div>
    </div>

    <script>
        // מפתח ה-API יוזרק לכאן אוטומטית ע"י המערכת
        const apiKey = ""; 

        let vocab = JSON.parse(localStorage.getItem('tom_english_vocab') || '{}');
        let currentWord = null;
        let pType = 'words';

        // פונקציית עזר לשמירה ל-LocalStorage
        function saveToStorage() {
            localStorage.setItem('tom_english_vocab', JSON.stringify(vocab));
            render();
        }

        // פונקציה לקריאה ל-Gemini AI
        async function callGemini(prompt, systemPrompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    return JSON.parse(text || "{}");
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        window.addWordAI = async () => {
            const input = document.getElementById('new-word-input').value.trim();
            if (!input) return;

            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('btn-text').classList.add('hidden');

            const systemPrompt = `You are an English teacher for an 8-year-old Israeli boy. 
            Analyze the user input (Hebrew or English). 
            Return ONLY JSON: {"english": "Word", "hebrew": "תרגום לעברית", "phonetics": ["פונטיקה בעברית כמו שזה נשמע"]}.
            Example: {"english": "Apple", "hebrew": "תפוח", "phonetics": ["אפל"]}`;

            try {
                const result = await callGemini(input, systemPrompt);
                if (!result.english) throw new Error("Invalid response");

                const wordId = result.english.toLowerCase().replace(/[^a-z]/g, '');
                vocab[wordId] = result;
                
                saveToStorage();
                document.getElementById('new-word-input').value = "";
                showToast("המילה נוספה בהצלחה!", "bg-green-500");
            } catch (e) {
                console.error(e);
                showToast("שגיאה בחיבור ל-AI", "bg-red-500");
            } finally {
                document.getElementById('btn-loader').classList.add('hidden');
                document.getElementById('btn-text').classList.remove('hidden');
            }
        };

        window.deleteWord = (id) => {
            if (confirm('בטוח שרוצים למחוק?')) {
                delete vocab[id];
                saveToStorage();
            }
        };

        function render() {
            const list = Object.entries(vocab);
            document.getElementById('count').innerText = list.length;
            
            // רשימת גיא
            document.getElementById('guy-list').innerHTML = list.length ? list.map(([id, w]) => `
                <div class="flex items-center justify-between p-3 border rounded-xl bg-gray-50">
                    <div class="text-right">
                        <span class="font-bold text-lg">${w.hebrew}</span>
                        <span class="text-gray-400 mr-2" dir="ltr">(${w.english})</span>
                    </div>
                    <button onclick="deleteWord('${id}')" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('') : '<p class="text-center text-gray-400 py-4">עוד לא הוספת מילים...</p>';

            // רשימת תום
            document.getElementById('tom-list').innerHTML = list.map(([id, w]) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-b-4 border-green-300">
                    <div class="font-bold text-xl text-gray-800">${w.hebrew}</div>
                    <div class="text-green-600 font-bold uppercase tracking-wider">${w.english}</div>
                </div>
            `).join('');
        }

        window.startPractice = async (type) => {
            const words = Object.values(vocab);
            if (words.length === 0) {
                showToast("גיא צריך להוסיף מילים קודם!", "bg-orange-500");
                return;
            }
            
            pType = type;
            showView('view-practice');
            document.getElementById('practice-input').value = "";
            document.getElementById('practice-content').classList.add('hidden');
            document.getElementById('practice-loading').classList.remove('hidden');

            if (type === 'words') {
                currentWord = words[Math.floor(Math.random() * words.length)];
                document.getElementById('practice-q').innerText = currentWord.hebrew;
                document.getElementById('practice-loading').classList.add('hidden');
                document.getElementById('practice-content').classList.remove('hidden');
            } else {
                try {
                    const wordList = words.map(w => w.english).join(', ');
                    const sys = `Create a very short English sentence (3-4 words) for a child using some of these words: ${wordList}. 
                    Return ONLY JSON: {"english": "Sentence", "hebrew": "תרגום לעברית"}`;
                    const res = await callGemini("create sentence", sys);
                    
                    // לצורך הבדיקה בתרגול משפטים, אנחנו מצפים שהתשובה תהיה באנגלית
                    currentWord = { ...res, phonetics: [res.english] }; 
                    document.getElementById('practice-q').innerText = res.hebrew;
                } catch (e) {
                    showToast("שגיאה ביצירת משפט, חוזר למילים", "bg-red-500");
                    startPractice('words');
                    return;
                } finally {
                    document.getElementById('practice-loading').classList.add('hidden');
                    document.getElementById('practice-content').classList.remove('hidden');
                }
            }
        };

        window.checkAnswer = () => {
            const val = document.getElementById('practice-input').value.trim().toLowerCase();
            if (!val || !currentWord) return;

            // בדיקה האם התשובה תואמת למילה באנגלית או לאחד מהקירובים הפונטיים (אם קיימים)
            const isCorrect = (val === currentWord.english.toLowerCase()) || 
                              (currentWord.phonetics && currentWord.phonetics.some(p => p === val));
            
            if (isCorrect) {
                showToast("כל הכבוד תום! 🏆", "bg-green-500");
                setTimeout(() => startPractice(pType), 1200);
            } else {
                showToast("לא בדיוק, נסה שוב 💪", "bg-orange-500");
            }
        };

        window.showView = (id) => {
            ['view-selection', 'view-guy-login', 'view-guy-dash', 'view-tom-dash', 'view-practice'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        window.verifyGuy = () => {
            if (document.getElementById('guy-password').value === '5312') {
                showView('view-guy-dash');
                document.getElementById('guy-password').value = "";
            } else {
                showToast('סיסמה שגויה', 'bg-red-500');
            }
        };

        function showToast(msg, color) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast show ${color} shadow-lg`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { 
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // האזנה ל-Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('view-guy-login').classList.contains('hidden')) window.verifyGuy();
                else if (!document.getElementById('view-guy-dash').classList.contains('hidden')) window.addWordAI();
                else if (!document.getElementById('view-practice').classList.contains('hidden')) window.checkAnswer();
            }
        });

        // אתחול רשימה ראשונית
        render();
    </script>
</body>
</html>
